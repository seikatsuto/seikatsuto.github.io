<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>動画</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
  margin:0; padding:0;
  background:#000;
  height:100%;
  overflow:hidden;
}

/* プレイヤー */
#player {
  position:fixed;
  top:0; left:0;
  width:100vw; height:100vh;
  background:#000;
}

/* 倍速 */
.speed {
  position:fixed;
  top:50px;
  z-index:1000;
  padding:6px 8px;
  background:#fff;
  border-radius:6px;
}
.s1{left:10px;} .s2{left:70px;} .s3{left:130px;}

.active {
  background:#4CAF50;
  color:#fff;
}

/* 難易度ボタン */
.close {
  position:fixed;
  top:50px;
  z-index:1001;
  font-size:14px;
  padding:6px 8px;
  border-radius:6px;
}
.lv1 { right:10px; }
.lv2 { right:90px; }
.lv3 { right:170px; }
.lv4 { right:250px; }
.lv5 { right:330px; }
</style>
</head>

<body>

<!-- 倍速 -->
<button class="speed s1" onclick="setSpeed(1)">1.0×</button>
<button class="speed s2 active" onclick="setSpeed(1.5)">1.5×</button>
<button class="speed s3" onclick="setSpeed(2)">2.0×</button>

<!-- ★難易度ボタン -->
<button class="close lv1" onclick="closeWithReason(1)">×簡単すぎ</button>
<button class="close lv2" onclick="closeWithReason(2)">×かんたん</button>
<button class="close lv3" onclick="closeWithReason(3)">×ちょうど</button>
<button class="close lv4" onclick="closeWithReason(4)">×むずかしい</button>
<button class="close lv5" onclick="closeWithReason(5)">×難しすぎ</button>

<div id="player"></div>

<script>
// ========= 初期 =========
const params = new URLSearchParams(location.search);
const selectedV = params.get("v");
if (!selectedV) location.href = "index444.html";

// ========= ユーザ情報 =========
const child   = localStorage.getItem("childName") || "未選択";
const childno = localStorage.getItem("childNo") || "0";
const byou    = Number(localStorage.getItem("byou") || 1);
const subje   = localStorage.getItem("subjeName") || "未選択";

// ========= 状態 =========
let player;
let startTime = Date.now();
let videoDuration = 0;
let maxWatched = 0;
let closeLevel = null; // ★追加
const deviceId = getDeviceId();//■■端末乱数

//端末名を乱数で■■端末乱数zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz
function getDeviceId() {
  let id = localStorage.getItem("deviceId");
  if (!id) {
    id = crypto.randomUUID(); // 例: "c3a1e9b4-..."
    localStorage.setItem("deviceId", id);
  }
  return id;
}  
// ========= YouTube遅延 =========
function loadYT(){
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.body.appendChild(tag);
}

function onYouTubeIframeAPIReady(){
  setTimeout(()=>{
    player = new YT.Player('player',{
      videoId:selectedV,
      playerVars:{ autoplay:1, playsinline:1 },
      events:{
        onReady:onReady,
        onStateChange:onStateChange
      }
    });
  },200);
}

function onReady(){
  videoDuration = player.getDuration();
  player.setPlaybackRate(1.5);
}

// ========= 視聴時間 =========
let timer=null;
function onStateChange(e){
  if(e.data===YT.PlayerState.PLAYING){
    timer=setInterval(()=>{
      const t=player.getCurrentTime();
      if(t>maxWatched) maxWatched=t;
    },1000);
  } else {
    clearInterval(timer);
  }
}

// ========= 倍速 =========
function setSpeed(rate){
  if(!player) return;
  player.setPlaybackRate(rate);
  document.querySelectorAll(".speed").forEach(b=>{
    b.classList.remove("active");
    if(b.textContent.startsWith(rate)) b.classList.add("active");
  });
}

// ========= ログ =========
function saveLog(){

  const logs = JSON.parse(localStorage.getItem("studyLogs") || "[]");
  const prev = logs.at(-1) || {};

  let pointima = Number(prev.pointima||0);
  let pointimas= Number(prev.pointimas||0);
  let pointimah= Number(prev.pointimah||0);
  let pointima2= Number(prev.pointima2||0);

  const sec = Math.min(
    videoDuration/1.5,
    Math.round((Date.now()-startTime)/1000)
  );

  let mang = 1/byou;
  if(subje==='漫画') mang = -1;

  if(childno==0) pointima += Math.round(sec*mang);
  if(childno==1) pointimas+= Math.round(sec*mang);
  if(childno==2) pointimah+= Math.round(sec*mang);
  if(childno==3) pointima2+= Math.round(sec*mang);

  const watchedRatio = videoDuration
    ? Math.round((maxWatched/videoDuration)*100)
    : 0;

  logs.push({
    video:selectedV,
    child, subje,
    level: closeLevel, // ★ここに入る
    start:startTime,
    end:Date.now(),
    duration:Date.now()-startTime,
    watchedRatio,
    pointima, pointimas, pointimah, pointima2
  });

  if(logs.length>100) logs.shift();

  localStorage.setItem("studyLogs", JSON.stringify(logs));

  //zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz
  
  
  // GitHubへCSV追記 ■■zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz  
  const csvLine = [
    deviceId,
    child,
    subje,
    selectedV,
    new Date(startTime).toLocaleString(),
    new Date().toLocaleString(),
    closeLevel,
    watchedRatio,
    Math.round((Date.now() - startTime) / 1000),
    pointima,
    pointimas,
    pointimah,
    pointima2
  ].join(",");
  
  
  try{
  //  navigator.sendBeacon("/log", JSON.stringify(logs.at(-1)));
    const ok = navigator.sendBeacon(   //■■
      "https://script.google.com/macros/s/AKfycbxD0bv5iR_cJXlKqHEyLlKRGFab9Hzj50zvOy0Pefw2lJDiqBCfSEKWxR4cVCst4c25/exec", //■■
      new URLSearchParams({ text: csvLine })
    );
  }catch(e){}
  
  
}

// ========= ★ボタン処理 =========
function closeWithReason(level){
  closeLevel = level;

  saveLog(); // ★押した瞬間に保存

  const dur = Date.now() - startTime;

  if(dur > 60000){
    location.href = "gacha.html";
  } else {
    location.href = "index444.html";
  }
}

// ========= 離脱 =========
//window.addEventListener("pagehide", saveLog);//★二重保存

// ========= 起動 =========
window.addEventListener("load", ()=>{
  setTimeout(loadYT,300);
});
</script>

</body>
</html>
