//studyLogs を集計する  難度色とポイントzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz -->
function buildVideoStatus() {
  if (!dare) return {}; // ★
  const logs = JSON.parse(localStorage.getItem("studyLogs") || "[]");
  const videoStatus = {};
  //pointima =1000;   // ★ポイント　初期値
  let mm=1;  // ★
  let nn=1;  // ★
  logs.forEach(l => {
    mm=mm+1;  // ★
    if (!l.video) return;
    if (l.child !== dare) return;
    nn=nn+1;  // ★

    const watched =
      l.level <= 2 ||
      (l.level === 3 && l.duration >= 2 * 60 * 1000) ||
      (l.level === 4 && l.duration >= 2 * 60 * 1000 && l.watchedRatio >= 70);
    const watchednan =
      (l.level === 4 && l.watchedRatio >= 60) ||
      (l.level === 5 && l.watchedRatio >= 70);
    const nan =
      (l.level === 4 && l.watchedRatio < 60) ||
      (l.level === 5 && l.watchedRatio < 70);
    if (watched) videoStatus[l.video] = "watched";
    else if (watchednan) videoStatus[l.video] = "watchednan";
    else videoStatus[l.video] = "nan";
  });
  //document.getElementById("point").textContent = pointima;// ★ 

  return videoStatus;
}

// DOM を見て class を付けるzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz -->
function applyStatus() {
  const videoStatus = buildVideoStatus();

  document.querySelectorAll("#videoList li").forEach(li => {
    li.classList.remove("watched", "watchednan", "nan");

    const a = li.querySelector("a");
    if (!a) return;

    const vid = new URL(a.href, location.href).searchParams.get("v");
    if (videoStatus[vid]) {
      li.classList.add(videoStatus[vid]);
    }
  });
}

// ポイント表示を「関数化」zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz

  if (el) el.textContent = Math.floor(p);
}

  // 子ども復元zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz
  dare = localStorage.getItem("childName");
  let hito2 = localStorage.getItem("hito");   //HTML変数引継ぎ方法
  let futa2 = localStorage.getItem("futa");  //HTML変数引継ぎ方法
  let sann2 = localStorage.getItem("sann");  //HTML変数引継ぎ方法
  let yoni2 = localStorage.getItem("yoni");  //HTML変数引継ぎ方法
  let childno2 ='';
  if (dare) {
    document.querySelectorAll(".child-btn").forEach(btn => {
      if (btn.textContent.trim() === dare) {
        btn.classList.add("active");
        if     (dare===hito2){childno2=0;}// ← ★
        else if(dare===futa2){childno2=1;}
        else if(dare===sann2){childno2=2;}
        else if(dare===yoni2){childno2=3;}
      }
    });
    localStorage.setItem("childNo",childno2);
   console.log("childno =",childno2);  // ← ★
  }

  // 科目復元zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz
  const subje = localStorage.getItem("subjeName");
  if (subje) {
    document.querySelectorAll(".subje-btn").forEach(btn => {
      if (btn.dataset.subje === subje) {
        setSubje(btn, subje);
      }
    });
  }

  // ポイント表示zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz
  updatePointView();

  // 視聴状況反映zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz
  applyStatus();
});
</script>
