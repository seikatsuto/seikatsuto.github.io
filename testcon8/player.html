<script>
let volume = 50; // 初期音量（安全域）

//端末名を乱数でzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz
function getDeviceId() {
  let id = localStorage.getItem("deviceId");
  if (!id) {
    id = crypto.randomUUID(); // 例: "c3a1e9b4-..."
    localStorage.setItem("deviceId", id);
  }
  return id;
}  
//ボリューム設定zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz
function setVol(delta) {
  //volume = Math.min(60, Math.max(30, volume + delta));
  volume = Math.min(90, Math.max(30, volume + delta));
  document.getElementById("volValue").textContent = volume;
  if (window.fully && fully.setVolume) {
    fully.setVolume(volume);
  } else {
    //alert("fully.setVolume が使えません");
  }
  //alert("fully = " + typeof window.fully + "\n" +"setVolume = " + (window.fully && typeof fully.setVolume));
}
//保存関数を独立させるzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz
  function saveLog() {
  const logs = JSON.parse(localStorage.getItem("studyLogs") || "[]");

    pointimah,

  localStorage.setItem("studyLogs", JSON.stringify(logs));
}
</script>

<!-- 1.5倍速ボタンを追加 zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz -->
<button class="vol v1" onclick="setSpeed(1)">1.0×</button>
<button class="vol v2 active" onclick="setSpeed(1.5)">1.5×</button>
<button class="vol v3" onclick="setSpeed(2)">2.0×</button>

<script>
let sec=0; //★
function onPlayerReady(e) {
  videoDuration = player.getDuration();
  sec = Math.floor(player.getDuration());//★ビデオの長さ
  //alert(sec + " 秒");
  player.setPlaybackRate(1.5);   // ★デフォルト 1.5倍
  setActiveSpeed(1.5);
}
function setSpeed(rate) {
  if (!player || !player.setPlaybackRate) return;

  player.setPlaybackRate(rate);
  setActiveSpeed(rate);
}

function setActiveSpeed(rate) {
  document.querySelectorAll(".vol").forEach(btn => {
    btn.classList.remove("active");
    if (btn.textContent.startsWith(rate)) {
      btn.classList.add("active");
    }
  });
}
</script>

     style="position:fixed; bottom:10px; left:200px;

<script>
if ('getBattery' in navigator) {
  navigator.getBattery().then(battery => {
    function update() {
      const level = Math.round(battery.level * 100);
      document.getElementById('battery').textContent =
        '🔋 ' + level + '%';
    }
    update();
    battery.addEventListener('levelchange', update);
  });
}
</script>

<script>

let watchTimer = null;

function onPlayerStateChange(e) {
  if (e.data === YT.PlayerState.PLAYING) {
    watchTimer = setInterval(() => {
      const t = player.getCurrentTime();
      if (t > maxWatched) maxWatched = t;
    }, 1000);
  } else {
    clearInterval(watchTimer);
  }
}
  
//zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz  
/* ★追加①：入室ログ */

const childno = localStorage.getItem("childNo") || "未選択";//■■0-3
const byou = localStorage.getItem("byou") || "未選択";//■■ byou =1point

const subje = localStorage.getItem("subjeName") || "未選択";
const logId = Date.now();
let logged = false; 
let level = 0;//■■
//let perc = 0;//■■ パーセント
let pointima = 0;//■■ ポイント
let pointimas = 0;//■■ ポイント
let pointimah = 0;//■■ ポイント
let pointima2 = 0;//■■ ポイント
let watchedRatio = 0;//■■
const deviceId = getDeviceId();//■■端末乱数
//zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz  
window.addEventListener("beforeunload", () => {//■■
  if (logged) return;
  logged = true;
  const logs = JSON.parse(localStorage.getItem("studyLogs") || "[]");
  let pointpre = Number(logs.at(-1)?.pointima ?? 0); //■■ 
  let pointpres = Number(logs.at(-1)?.pointimas ?? 0); //■■ 
  let pointpreh = Number(logs.at(-1)?.pointimah ?? 0); //■■ 
  let pointpre2 = Number(logs.at(-1)?.pointima2 ?? 0); //■■ 
  
  let mang=1/Number(byou); //■■
  console.log("mang =", mang); //■■
  if(subje==='漫画') mang=-1; //■■
  pointima = Math.round(pointpre); //■■
  pointimas= Math.round(pointpres); //■■
  pointimah= Math.round(pointpreh); //■■
  pointima2= Math.round(pointpre2); //■■
  const secmin = Math.min(sec/1.5,Math.round((Date.now() - startTime)/1000)); // ← ★max  秒
 //const secmin = Math.min(sec,Math.round((Date.now() - startTime)/1000),1200); // ← ★max1200秒
 //const secmin = Math.min(Math.round((Date.now() - startTime)/1000),600); // ← ★max600秒
  
  if     ((childno === 0) || (childno === '0')){pointima=Math.round(secmin*mang+ pointpre);}  // ← ★ ポイント　秒
  else if((childno === 1) || (childno === '1')){pointimas=Math.round(secmin*mang+ pointpres);}  // ← ★ ポイント　秒
  else if((childno === 2) || (childno === '2')){pointimah=Math.round(secmin*mang+ pointpreh);}  // ← ★ ポイント　秒
  else if((childno === 3) || (childno === '3')){pointima2=Math.round(secmin*mang+ pointpre2);}  // ← ★ ポイント　秒
  
  
  console.log("childno =",childno);  // ← ★
  console.log("secmin =", secmin);  // ← ★
  console.log("sec =", sec);  // ← ★
  console.log("mang =", mang);  // ← ★
  console.log("pointima =", pointima);  // ← ★
  console.log("pointpre =", pointpre);  // ← ★
  console.log("pointimas =", pointimas);  // ← ★
  console.log("pointpres =", pointpres);  // ← ★
  
  
  //alert(child+'  '+Date.now()+'  '+startTime+'  '+mang+'  '+pointpre+'  '+pointpre2+'  '+pointima+'  '+pointima2); //  ★
  watchedRatio = videoDuration
    ? Math.round((maxWatched / videoDuration) * 100)
    : null;    //★
  logs.push({
    deviceId: deviceId,
    id: logId,
    //page: "player.html",
    video: selectedV,
    child: child,
    subje: subje, 
    start: startTime,
    end: Date.now(),
    level: closeLevel,   // ← ★追加（1〜5 or null）
    watchedRatio: watchedRatio,      // ← ★ 何割見たか（％）
    duration: Date.now() - startTime,

  localStorage.setItem("studyLogs", JSON.stringify(logs));

// GitHubへCSV追記 zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz

//alert(Object.keys(localStorage).join("\n"));       //■■
