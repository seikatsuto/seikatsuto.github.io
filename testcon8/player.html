<button class="vol v1" onclick="setSpeed(1)">1.0×</button>

<script>
let sec=0; //★
function onPlayerReady(e) {
  videoDuration = player.getDuration();
  sec = Math.floor(player.getDuration());//★ビデオの長さ
  //alert(sec + " 秒");
  player.setPlaybackRate(1.5);   // ★デフォルト 1.5倍
  setActiveSpeed(1.5);
}
function setSpeed(rate) {
  if (!player || !player.setPlaybackRate) return;

  player.setPlaybackRate(rate);
  setActiveSpeed(rate);
}

function setActiveSpeed(rate) {
  document.querySelectorAll(".vol").forEach(btn => {
    btn.classList.remove("active");
    if (btn.textContent.startsWith(rate)) {
      btn.classList.add("active");
    }
  });
}
</script>

<script>
if ('getBattery' in navigator) {
  navigator.getBattery().then(battery => {
    function update() {
      const level = Math.round(battery.level * 100);

    }
    update();
    battery.addEventListener('levelchange', update);
  });
}
