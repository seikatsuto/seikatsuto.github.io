<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>プロ仕様スロット</title>

<style>
body{
text-align:center;
background:#000;
color:#fff;
font-family:sans-serif;
overflow:hidden;

/* ★ 全体拡大（ロジック崩さない） */
transform: scale(1.8);
transform-origin: top center;
}

#slot{
display:flex;
justify-content:center;
margin-top:30px;
}

.reel{
width:100px;
height:150px;
overflow:hidden;
border:3px solid #fff;
margin:10px;
border-radius:10px;
cursor:pointer;
position:relative;
}

.inner{
position:absolute;
width:100%;
top:0;
left:0;
}

.symbol{
height:50px;
line-height:50px;
font-size:28px;
text-align:center;
}

.line{
position:absolute;
top:50%;
left:0;
width:100%;
height:2px;
background:red;
transform:translateY(-50%);
pointer-events:none;
}

button{
font-size:18px;
padding:10px 20px;
margin:10px;
}

/* 当たり */
.win{
animation:flashWin 0.2s infinite;
}

@keyframes flashWin{
0%{background:#000;}
50%{background:#400;}
100%{background:#000;}
}

/* リーチ表示 */
#reach{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
font-weight:bold;
color:red;
text-shadow:0 0 20px yellow,0 0 40px red;
opacity:0;
pointer-events:none;
z-index:999;
}

.reachShow{
animation:reachFlash 0.6s infinite;
opacity:1;
}

@keyframes reachFlash{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.2);}
100%{transform:translate(-50%,-50%) scale(1);}
}

</style>
</head>

<body>

<h2>🎰 今日のうんだめし</h2>

<div id="slot">
<div class="reel" onclick="stopReel(0)">
<div class="inner" id="r0"></div>
<div class="line"></div>
</div>

<div class="reel" onclick="stopReel(1)">
<div class="inner" id="r1"></div>
<div class="line"></div>
</div>

<div class="reel" onclick="stopReel(2)">
<div class="inner" id="r2"></div>
<div class="line"></div>
</div>
</div>

<button onclick="spin()">まわす</button>

<h3 id="result"></h3>
<div id="reach"></div>

<audio id="coinSound" src="coin.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>
<audio id="hazureSound" src="hazure.mp3"></audio>
<audio id="reachSound" src="kyuin.mp3"></audio>

<script>

const symbols=["7️⃣","⭐","🍎","🍀","🔷"]

let reels=[false,false,false]
let timers=[null,null,null]
let pos=[0,0,0]
let speed=[0,0,0]
let coins=30


function build(i){
const el=document.getElementById("r"+i)
el.innerHTML=""

for(let j=0;j<200;j++){
const d=document.createElement("div")
d.className="symbol"

if(Math.random()<0.5){
d.innerText="7️⃣"
}else{
d.innerText=symbols[Math.floor(Math.random()*symbols.length)]
}

el.appendChild(d)
}
}

function spin(){

//zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz
//if(coins<10)return
if(coins<10){location.href = "index444.html";} // ★spinは3回まで★★ガチャ終

coins-=10
//save()

sound("coinSound")
//zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz


document.getElementById("result").innerText=""
document.body.classList.remove("win")

for(let i=0;i<3;i++){

build(i)
reels[i]=true
speed[i]=15 + Math.random()*3

timers[i]=setInterval(()=>{
pos[i]+=speed[i]
pos[i] %= (50*180)
document.getElementById("r"+i).style.transform=
"translateY(-"+pos[i]+"px)"
},20)

}
}

function stopReel(i){

if(!reels[i]) return

reels[i]=false
clearInterval(timers[i])

let index=Math.round(pos[i]/50)
let slip=Math.floor(Math.random()*3)-1
index+=slip

pos[i]=index*50

document.getElementById("r"+i).style.transform=
"translateY(-"+pos[i]+"px)"

/* リーチチェック */
checkReach()

if(reels.every(r=>!r)) judge()

}

function getCenter(i){
let reel=document.getElementById("r"+i)
let index = Math.round((pos[i] + 50) / 50)
return reel.children[index % 200].innerText
}

/* リーチ判定 */
function checkReach(){

let stopped = reels.filter(r=>!r).length
if(stopped !== 2) return

let vals=[]
for(let i=0;i<3;i++){
if(!reels[i]) vals.push(getCenter(i))
}

if(vals.length===2 && vals[0]===vals[1]){

showReach()

/* 最後のリールを遅く */
for(let i=0;i<3;i++){
if(reels[i]) speed[i]=4
}

}
}

/* リーチ表示（キュイーン） */
function showReach(){
const r=document.getElementById("reach")
r.innerText="🔥 リーチ！ 🔥"
r.classList.add("reachShow")

sound("reachSound") // ★キュイーン
}

/* 判定 */
function judge(){

document.getElementById("reach").classList.remove("reachShow")

let a=getCenter(0)
let b=getCenter(1)
let c=getCenter(2)

if(a==b && b==c){

document.body.classList.add("win")

if(a=="7️⃣"){
document.getElementById("result").innerText="🌈 777 大あたり!!!"
sound("winSound")
}else{
document.getElementById("result").innerText="🎉 あたり！"
}

}else{
document.getElementById("result").innerText=a+" "+b+" "+c+" はずれ"
sound("hazureSound")
}

}

/* 音 */
function sound(id){
const a=document.getElementById(id)
a.currentTime=0
a.play().catch(()=>{})
}

</script>
</body>
</html>
